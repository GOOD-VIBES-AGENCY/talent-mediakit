name: Refresh Mediakit Thumbnails

on:
  schedule:
    # 毎週月曜 09:00 JST (= 00:00 UTC)
    - cron: '0 0 * * 1'
  workflow_dispatch:
    # 手動実行も可能

jobs:
  refresh-thumbnails:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Refresh thumbnails for all talents
        run: python3 scripts/refresh_mediakit.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: サムネイル自動更新 $(date +'%Y-%m-%d')"
          git push
