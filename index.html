<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOOD VIBES AGENCY — Talent Media Kit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400&family=DM+Sans:ital,opsz,wght@0,9..40,200;0,9..40,300;0,9..40,400;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }

    :root {
      --black: #111111;
      --dark:  #333333;
      --mid:   #777777;
      --light: #aaaaaa;
      --rule:  #e8e8e8;
      --bg:    #ffffff;
      --bg2:   #f9f9f9;
      --sans:  'DM Sans', sans-serif;
      --ja:    'Zen Kaku Gothic New', 'DM Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--black);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }

    /* NAV */
    nav {
      border-bottom: 1px solid var(--rule);
      padding: 1.5rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .nav-logo {
      font-size: 0.62rem;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--black);
    }
    .nav-sub {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: var(--light);
    }

    /* HERO */
    .hero {
      padding: 6rem 3rem 5rem;
      border-bottom: 1px solid var(--rule);
    }
    .hero-label {
      font-size: 0.58rem;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--light);
      margin-bottom: 1.5rem;
    }
    .hero-title {
      font-family: var(--ja);
      font-size: clamp(2rem, 4vw, 3.5rem);
      font-weight: 300;
      line-height: 1.2;
      color: var(--black);
      letter-spacing: -0.01em;
      margin-bottom: 1rem;
    }
    .hero-desc {
      font-size: 0.88rem;
      font-weight: 300;
      color: var(--mid);
      line-height: 1.8;
      max-width: 520px;
    }

    /* GRID */
    .grid-section {
      padding: 5rem 3rem;
    }
    .grid-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--rule);
      padding-bottom: 1.25rem;
      margin-bottom: 3rem;
    }
    .grid-label {
      font-size: 0.58rem;
      font-weight: 400;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--light);
    }
    .grid-count {
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      color: var(--light);
    }

    .talent-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }

    .talent-card {
      border: 1px solid var(--rule);
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
      display: block;
    }
    .talent-card:hover {
      border-color: var(--dark);
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    }

    .card-photo {
      aspect-ratio: 3/4;
      overflow: hidden;
      background: var(--bg2);
      position: relative;
    }
    .card-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 15%;
      transition: transform 0.4s ease;
      display: block;
    }
    .talent-card:hover .card-photo img {
      transform: scale(1.04);
    }

    .card-body {
      padding: 1.4rem 1.5rem;
      border-top: 1px solid var(--rule);
    }

    .card-label {
      font-size: 0.55rem;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--light);
      margin-bottom: 0.5rem;
    }

    .card-name {
      font-family: var(--ja);
      font-size: 1.2rem;
      font-weight: 300;
      color: var(--black);
      letter-spacing: -0.01em;
      margin-bottom: 0.2rem;
    }

    .card-handle {
      font-size: 0.68rem;
      font-weight: 300;
      color: var(--light);
      letter-spacing: 0.04em;
      margin-bottom: 1.1rem;
    }

    .card-stats {
      display: flex;
      gap: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--rule);
    }

    .card-stat-num {
      font-family: var(--ja);
      font-size: 1rem;
      font-weight: 300;
      color: var(--black);
      line-height: 1;
      letter-spacing: -0.01em;
    }
    .card-stat-label {
      font-size: 0.5rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--light);
      margin-top: 0.3rem;
    }

    .card-arrow {
      margin-left: auto;
      align-self: center;
      font-size: 0.7rem;
      color: var(--rule);
      transition: color 0.2s, transform 0.2s;
    }
    .talent-card:hover .card-arrow {
      color: var(--black);
      transform: translateX(3px);
    }

    /* FOOTER */
    footer {
      background: var(--black);
      padding: 2rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-l {
      font-size: 0.6rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
    }
    .footer-r {
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.12);
    }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      nav { padding: 1rem 1.5rem; }
      .hero { padding: 4rem 1.5rem 3rem; }
      .grid-section { padding: 3rem 1.5rem; }
      .talent-grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
      footer { flex-direction: column; gap: 0.5rem; text-align: center; padding: 1.5rem; }
    }
    @media (max-width: 540px) {
      .talent-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-logo">Good Vibes Agency</div>
    <div class="nav-sub">Talent Media Kit</div>
  </nav>

  <div class="hero">
    <p class="hero-label">GVA Roster 2026</p>
    <h1 class="hero-title">所属タレント<br>メディアキット</h1>
    <p class="hero-desc">
      GOOD VIBES AGENCY 所属クリエイター・タレントの一覧です。<br>
      各ページにてプロフィール・実績・料金目安をご確認いただけます。
    </p>
  </div>

  <div class="grid-section">
    <div class="grid-head">
      <span class="grid-label">All Talents</span>
      <span class="grid-count">9 creators</span>
    </div>
    <div class="talent-grid" id="talent-grid"></div>
  </div>

  <footer>
    <div class="footer-l">© 2026 Good Vibes Agency</div>
    <div class="footer-r">Confidential — For Business Use Only</div>
  </footer>

  <script>
  const TALENTS = [
    {
      name: "Momoka",   nameJa: "桃佳",      handle: "@moo_mo_k",
      label: "Beauty Creator",
      ig:  "217,000+",  total: "517,000+",
      photo: "./momoka/momoka.jpg",  url: "./momoka/"
    },
    {
      name: "Kanna",    nameJa: "かんな",     handle: "@k_r__ko",
      label: "Fashion Creator",
      ig:  "169,000+",  total: "228,000+",
      photo: "./kanna/kanna.jpg",    url: "./kanna/"
    },
    {
      name: "Yui",      nameJa: "ゆい",       handle: "@yui___12.8",
      label: "Lifestyle Creator",
      ig:  "192,000+",  total: "244,000+",
      photo: "./yui/yui.jpg",        url: "./yui/"
    },
    {
      name: "Saki",     nameJa: "岸本沙季",   handle: "@saki__kishimoto",
      label: "Lifestyle Creator",
      ig:  "62,000+",   total: "62,000+",
      photo: "./saki/saki.jpg",      url: "./saki/"
    },
    {
      name: "Miu",      nameJa: "miu",        handle: "@uruuril",
      label: "Beauty Creator",
      ig:  "67,000+",   total: "91,000+",
      photo: "./miu/miu.jpg",        url: "./miu/"
    },
    {
      name: "Ririka",   nameJa: "小西莉々栞", handle: "@ririka_konishi",
      label: "Fashion Creator",
      ig:  "65,000+",   total: "167,000+",
      photo: "./ririka/ririka.jpg",  url: "./ririka/"
    },
    {
      name: "Mayu",     nameJa: "酒巻茉侑",   handle: "@mkmyxi",
      label: "Lifestyle Creator",
      ig:  "24,000+",   total: "24,000+",
      photo: "./mayu/mayu.jpg",      url: "./mayu/"
    },
    {
      name: "Sae",      nameJa: "紗英",       handle: "@saeeeoky",
      label: "Model & Creator",
      ig:  "28,000+",   total: "36,000+",
      photo: "./sae/sae.jpg",        url: "./sae/"
    },
    {
      name: "Oto",      nameJa: "乙",         handle: "@_021miu",
      label: "Model & Influencer",
      ig:  "242,000+",  total: "508,000+",
      photo: "./oto/oto.jpg",        url: "./oto/"
    },
  ];

  const grid = document.getElementById('talent-grid');
  TALENTS.forEach(t => {
    const a = document.createElement('a');
    a.className = 'talent-card';
    a.href = t.url;
    a.innerHTML = `
      <div class="card-photo">
        <img src="${t.photo}" alt="${t.nameJa}" loading="lazy">
      </div>
      <div class="card-body">
        <div class="card-label">${t.label}</div>
        <div class="card-name">${t.nameJa} <span style="font-family:var(--sans);font-size:.8rem;font-weight:300;color:var(--light);letter-spacing:0;">${t.name}</span></div>
        <div class="card-handle">${t.handle}</div>
        <div class="card-stats">
          <div>
            <div class="card-stat-num">${t.ig}</div>
            <div class="card-stat-label">Instagram</div>
          </div>
          <div>
            <div class="card-stat-num">${t.total}</div>
            <div class="card-stat-label">Total Reach</div>
          </div>
          <span class="card-arrow">→</span>
        </div>
      </div>
    `;
    grid.appendChild(a);
  });
  </script>
</body>
</html>
