  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; overflow-x: hidden; scroll-behavior: smooth; }

    :root {
      --black:   #111111;
      --dark:    #333333;
      --mid:     #777777;
      --light:   #aaaaaa;
      --rule:    #e8e8e8;
      --bg:      #ffffff;
      --bg2:     #f9f9f9;
      --sans:    'DM Sans', -apple-system, sans-serif;
      --heading: 'Zen Kaku Gothic New', 'DM Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--black);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
    }

    img { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }

    /* ─── NAV ─── */
    nav {
      position: fixed;
      inset: 0 0 auto 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 3rem;
      background: rgba(255,255,255,0);
      transition: background .3s, border-color .3s;
      border-bottom: 1px solid transparent;
    }
    nav.scrolled {
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(8px);
      border-bottom-color: var(--rule);
    }
    .nav-logo {
      font-size: 0.62rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--black);
    }
    .nav-date {
      font-size: 0.62rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: var(--light);
    }

    /* ─── HERO ─── */
    .hero {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: 100vh;
      padding-top: 4rem;
    }
    .hero-photo {
      overflow: hidden;
      background: var(--bg2);
    }
    .hero-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 15%;
    }
    .hero-copy {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 3rem 4rem;
      border-left: 1px solid var(--rule);
      overflow-y: auto;
    }
    .hero-label {
      font-size: 0.58rem;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--light);
      margin-bottom: 2rem;
    }
    .hero-name {
      font-family: var(--heading);
      font-size: clamp(3.5rem, 7vw, 6.5rem);
      font-weight: 400;
      line-height: 1;
      color: var(--black);
      letter-spacing: -0.02em;
      margin-bottom: 0.3rem;
    }
    .hero-name-ja {
      font-family: var(--sans);
      font-size: 0.75rem;
      font-weight: 300;
      letter-spacing: 0.5em;
      color: var(--light);
      margin-bottom: 2.5rem;
    }
    .hero-tagline {
      font-size: 0.95rem;
      font-weight: 300;
      color: var(--mid);
      line-height: 1.8;
      margin-bottom: 2.5rem;
    }
    .hero-links {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 3rem;
    }
    .hero-link {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.72rem;
      font-weight: 300;
      color: var(--mid);
      letter-spacing: 0.04em;
      transition: color .2s;
    }
    .hero-link:hover { color: var(--black); }
    .hero-link-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--rule);
      flex-shrink: 0;
    }
    .hero-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-top: 1px solid var(--rule);
      padding-top: 2.5rem;
      gap: 0;
    }
    .hero-stat + .hero-stat {
      border-left: 1px solid var(--rule);
      padding-left: 1.5rem;
    }
    .hero-stat-num {
      font-family: var(--sans);
      font-size: clamp(1.3rem, 2.5vw, 2rem);
      font-weight: 300;
      color: var(--black);
      line-height: 1;
      letter-spacing: -0.02em;
    }
    .hero-stat-label {
      font-size: 0.56rem;
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--light);
      margin-top: 0.4rem;
    }

    /* ─── COMMON SECTION ─── */
    .sec {
      padding: 8rem 0;
    }
    .sec.alt { background: var(--bg2); }

      flex-direction: column;
      align-items: flex-start;
      gap: 0.75rem;
      border-bottom: 1px solid var(--rule);
      padding-bottom: 1.5rem;
      margin-bottom: 4rem;

    .dark .sec-head { border-bottom-color: rgba(255,255,255,0.1); }
    .sec-label {

      font-weight: 400;
      letter-spacing: 0.28em;
      text-transform: uppercase;

    .dark .sec-label { color: rgba(255,255,255,0.3); }
    .sec-title {
      font-family: var(--heading);
      font-size: clamp(2rem, 4vw, 3.5rem);
      font-weight: 300;
      line-height: 1.2;
      color: var(--black);
      letter-spacing: -0.01em;
    }
    .dark .sec-title { color: var(--bg); }

    /* ─── PROFILE ─── */
    .profile-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6rem;
      align-items: start;

    .profile-bio {
      font-size: 0.95rem;

      line-height: 2.1;
      margin-bottom: 2.5rem;
    }
    .tag-list {

      flex-wrap: wrap;
      gap: 0.4rem;
    }
    .tag {

      font-weight: 300;
      letter-spacing: 0.06em;
      padding: 0.4rem 0.9rem;
      border: 1px solid var(--rule);
      color: var(--mid);
    }
    .fact-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 1rem 0;
      border-bottom: 1px solid var(--rule);
    }
    .fact-row:first-child { border-top: 1px solid var(--rule); }
    .fact-label {
      font-size: 0.6rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--light);
    }
    .fact-val {
      font-size: 0.88rem;
      font-weight: 300;
      color: var(--dark);
    }

    /* ─── HIGHLIGHT BLOCK ─── */
    .highlight-block {
      background: var(--bg2);
      border: 1px solid var(--rule);
      padding: 2.5rem 3rem;
      margin-bottom: 4rem;
    }
    .highlight-label {
      font-size: 0.56rem;
      font-weight: 400;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--light);
      margin-bottom: 1rem;
    }
    .highlight-text {
      font-family: var(--heading);
      font-size: clamp(1.1rem, 2vw, 1.5rem);
      font-weight: 300;
      color: var(--black);
      line-height: 1.8;
    }
    .highlight-num {
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 300;
      color: var(--black);
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 0.3rem;
    }

    /* ─── GENRES ─── */
    .genre-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.4rem 0;
      border-bottom: 1px solid var(--rule);
      cursor: default;
    }
    .genre-row:first-child { border-top: 1px solid var(--rule); }
    .genre-left { display: flex; align-items: center; gap: 1.5rem; }
    .genre-n {
      font-size: 0.6rem; font-weight: 300;
      letter-spacing: 0.1em; color: var(--light);
      width: 1.5rem;
    }
    .genre-name {
      font-family: var(--heading);
      font-size: clamp(1.2rem, 2vw, 1.6rem);
      font-weight: 300;
      color: var(--black);
      letter-spacing: -0.01em;
    }

    /* ─── PRICING ─── */
    .pricing-grid {
      display: grid;
      grid-template-columns: 1fr 1.6fr;
      gap: 6rem;
      align-items: start;
    }
    .pricing-desc {
      font-size: 0.88rem;
      font-weight: 300;
      color: var(--mid);
      line-height: 2;
      margin-top: 1.5rem;

    .p-table { width: 100%; border-collapse: collapse; }
    .p-table tr { border-bottom: 1px solid var(--rule); }
    .p-table tr:first-child { border-top: 1px solid var(--rule); }
    .p-table tr:hover { background: var(--bg2); }
    .p-table td { padding: 1.2rem 0; }
    .p-table td:first-child {

    }
    .p-table td:last-child { text-align: right; }
    .p-price {

    }
    .p-unit {
      font-size: 0.6rem; font-weight: 300;
      color: var(--light); margin-left: 0.3rem;

    .footer-r {
      font-size: 0.56rem; font-weight: 300;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: rgba(255,255,255,0.12);
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 860px) {
      nav { padding: 1rem 1.5rem; }
      .wrap { padding: 0 1.5rem; }
      .sec { padding: 5rem 0; }
      .hero { grid-template-columns: 1fr; height: auto; padding-top: 3.5rem; }
      .hero-photo { height: 75vw; min-height: 260px; }
      .hero-copy { border-left: none; border-top: 1px solid var(--rule); padding: 2.5rem 1.5rem 3.5rem; overflow-y: visible; }
      .hero-stats { grid-template-columns: repeat(3, 1fr); }
      .profile-grid, .pricing-grid { grid-template-columns: 1fr; gap: 3rem; }
      .highlight-block { padding: 2rem 1.5rem; }
      footer { flex-direction: column; gap: 0.5rem; text-align: center; padding: 1.5rem; }
    }
  </style>
  <link rel="icon" type="image/png" href="../favicon.png">
</head>
<body>

  <!-- NAV -->
  <nav id="nav">
    <div class="nav-logo">Good Vibes Agency</div>
    <div class="nav-date" id="nav-date">Media Kit 2026.07</div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-photo">
      <img src="./nana.jpg" alt="NANA — nana">
    </div>
    <div class="hero-copy">
      <p class="hero-label">Talent — Korean Style Creator</p>
      <h1 class="hero-name">Nana</h1>
      <p class="hero-name-ja">緋野なな</p>
      <p class="hero-tagline" id="hero-tagline"></p>
      <div class="hero-links" id="hero-links"></div>
      <div class="hero-stats" id="hero-stats"></div>
    </div>
  </section>

  <!-- PROFILE -->
  <section class="sec">
    <div class="wrap">
      <div class="sec-head">
        <div class="sec-label">Profile</div>
        <h2 class="sec-title">About Nana</h2>
      </div>
      <div class="profile-grid">
        <div>
          <p class="profile-bio" id="profile-bio"></p>
          <div class="tag-list" id="strengths"></div>
        </div>
        <div id="profile-facts"></div>
      </div>
    </div>
  </section>

  <!-- GENRES -->
  <section class="sec alt">
    <div class="wrap">
      <div class="sec-head">
        <div class="sec-label">Expertise</div>
        <h2 class="sec-title">得意ジャンル</h2>
      </div>
      <div id="genre-list"></div>
    </div>
  </section>

  <!-- PRICING -->
  <section class="sec">
    <div class="wrap">
      <div class="sec-head">
        <div class="sec-label">Pricing</div>
        <h2 class="sec-title">料金目安</h2>
      </div>
      <div class="pricing-grid">
        <div>
          <p class="pricing-desc">
            記載の金額はあくまで目安です。案件内容・期間・プラットフォームの組み合わせによって変動いたします。詳細はお気軽にお問い合わせください。
          </p>
        </div>
        <table class="p-table">
          <tbody id="pricing-body"></tbody>
        </table>
      </div>
    </div>
  </section>

  <!-- CONTACT -->
  <section class="sec dark">
    <div class="wrap">
      <div class="contact-inner">
        <p class="contact-label" id="contact-agency"></p>
        <h2 class="contact-title">Let's work<br>together.</h2>
        <p class="contact-sub" id="contact-sub"></p>
        <div class="contact-btns">
          <a class="btn-w" id="contact-email" href="">Contact Us</a>
          <a class="btn-ghost2" id="contact-web" href="" target="_blank">Visit Website</a>
        </div>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <div class="footer-l" id="footer-l"></div>
    <div class="footer-r">Confidential — For Business Use Only</div>
  </footer>

  <script>
  (function () {
    // Hero tagline
    document.getElementById('hero-tagline').textContent = TALENT.taglineJa;

    // Hero links
    const linksEl = document.getElementById('hero-links');
    [
      { label: 'Instagram', url: TALENT.sns.instagram.url, handle: TALENT.sns.instagram.handle },
      { label: 'TikTok',    url: TALENT.sns.tiktok.url,    handle: TALENT.sns.tiktok.handle },
      { label: 'YouTube',   url: TALENT.sns.youtube.url,   handle: TALENT.sns.youtube.handle },
    ].forEach(s => {
      const a = document.createElement('a');
      a.className = 'hero-link';
      a.href = s.url; a.target = '_blank'; a.rel = 'noopener';
      a.innerHTML = `<span class="hero-link-dot"></span><span style="font-size:.56rem;letter-spacing:.2em;text-transform:uppercase;color:var(--light)">${s.label}</span> ${s.handle}`;
      linksEl.appendChild(a);
    });

    // Hero stats
    const statsEl = document.getElementById('hero-stats');
    [
      { num: TALENT.sns.instagram.followers, label: 'Instagram' },
      { num: TALENT.sns.tiktok.followers,    label: 'TikTok' },
      { num: TALENT.totalFollowers,          label: 'Total Reach' },
    ].forEach(s => {
      const d = document.createElement('div');
      d.className = 'hero-stat';
      d.innerHTML = `<div class="hero-stat-num">${s.num}</div><div class="hero-stat-label">${s.label}</div>`;
      statsEl.appendChild(d);
    });

    // Profile bio
    document.getElementById('profile-bio').textContent = TALENT.bio;
    const str = document.getElementById('strengths');
    TALENT.strengths.forEach(s => {
      const span = document.createElement('span'); span.className = 'tag'; span.textContent = s;
      str.appendChild(span);
    });

    // Profile facts
    const facts = document.getElementById('profile-facts');
    const factItems = [
      { label: 'Height',    val: TALENT.height },
      { label: 'From',      val: TALENT.birthplace },
      { label: 'Based',     val: TALENT.based },
      { label: 'Language',  val: '日本語 / 韓国語（日常会話）' },
      { label: 'Instagram', val: TALENT.sns.instagram.handle },
      { label: 'TikTok',    val: TALENT.sns.tiktok.handle },
      { label: 'YouTube',   val: TALENT.sns.youtube.handle },
    ];
    factItems.forEach(f => {
      const d = document.createElement('div'); d.className = 'fact-row';
      d.innerHTML = `<span class="fact-label">${f.label}</span><span class="fact-val">${f.val}</span>`;
      facts.appendChild(d);
    });

    // Genres
    const gl = document.getElementById('genre-list');
    TALENT.genres.forEach((g, i) => {
      const d = document.createElement('div'); d.className = 'genre-row';
      d.innerHTML = `<div class="genre-left"><span class="genre-n">0${i+1}</span><span class="genre-name">${g}</span></div>`;
      gl.appendChild(d);
    });

    // Pricing
    const pb = document.getElementById('pricing-body');
    TALENT.pricing.forEach(p => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${p.type}</td><td><span class="p-price">${p.price}</span><span class="p-unit">/ ${p.note}</span></td>`;
      pb.appendChild(tr);
    });

    // Contact & footer
    document.getElementById('contact-agency').textContent = TALENT.contact.agency;
    document.getElementById('contact-sub').textContent = `Inquiries about ${TALENT.nameJa} / ${TALENT.name}`;
    document.getElementById('contact-email').href = `mailto:${TALENT.contact.email}`;
    document.getElementById('contact-web').href = TALENT.contact.website;
    document.getElementById('footer-l').textContent = `© ${new Date().getFullYear()} ${TALENT.contact.agency}`;

    // Nav scroll
    const nav = document.getElementById('nav');
    window.addEventListener('scroll', () => nav.classList.toggle('scrolled', scrollY > 40), { passive: true });
  })();
  </script>
</body>
</html>
